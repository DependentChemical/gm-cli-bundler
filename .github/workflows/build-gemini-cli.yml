name: Remote Build Gemini CLI
on: workflow_dispatch # Manual trigger
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone Google Gemini CLI
        run: |
          git clone https://github.com/google-gemini/gemini-cli.git .
          git checkout main
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install & Build Binary
        run: |
          bun install
          bun run build:binary 
        env:
          BUNDLE_NATIVE_MODULES: "true"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: gemini-cli-windows
          path: dist/win32-x64/gemini.exe