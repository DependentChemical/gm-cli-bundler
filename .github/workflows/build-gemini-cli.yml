name: Remote Build Gemini CLI
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/google-gemini/gemini-cli.git .
          git checkout main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build Binary
        run: |
          # Bootstrap install so the build script can start
          npm install 
          # Run the full binary build process
          npm run build:binary
        env:
          BUNDLE_NATIVE_MODULES: "true"

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: gemini-cli-windows
          path: dist/win32-x64/gemini.exe
