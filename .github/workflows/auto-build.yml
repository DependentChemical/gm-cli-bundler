name: Build Standalone GM-CLI
on:
  schedule:
    - cron: '0 */12 * * *' # Checks twice a day
  workflow_dispatch: # Allows you to force a build manually

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Upstream SHA
        id: upstream
        run: |
          # Since the repo has no tags, we use the latest commit SHA from the main branch
          SHA=$(git ls-remote https://github.com/YoYoGames/gm-cli.git HEAD | awk '{ print $1 }')
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Using SHA: $SHA"
        
      - name: Check Existing Release
        id: check
        run: |
          # We check if a release already exists named after this specific commit SHA
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.upstream.outputs.short_sha }})
          if [ "$STATUS" == "200" ]; then
             echo "exists=true" >> $GITHUB_OUTPUT
          else
             echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Standalone EXE
        if: steps.check.outputs.exists == 'false'
        run: |
          # Clone the specific commit
          git clone https://github.com/YoYoGames/gm-cli.git build_dir
          cd build_dir
          git checkout ${{ steps.upstream.outputs.sha }}
          
          # Use Bun to compile (Fast, single-binary execution)
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          
          bun install
          
          # Use the verified entry point: src/bin/gm-cli.ts
          bun build ./src/bin/gm-cli.ts --compile --minify --target=bun-windows-x64 --outfile ../gm-cli.exe

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.short_sha }}
          name: GM-CLI Build (${{ steps.upstream.outputs.short_sha }})
          body: |
            Automated standalone build of the GameMaker CLI.
            Built from upstream commit: ${{ steps.upstream.outputs.sha }}
          files: gm-cli.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}